    <!-- four fingers -->
    <line x1="17" y1="20" x2="17" y2="10" />
    <line x1="22.5" y1="19" x2="22.5" y2="7" />
    <line x1="28" y1="19" x2="28" y2="8" />
    <line x1="33" y1="21" x2="33" y2="12" />
